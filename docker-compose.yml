services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cinema
      RABBITMQ_DEFAULT_PASS: cinema
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://mongodb:27017/cinema
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_TLS: "false"
      LOCK_TTL_SECONDS: "300"
      RABBITMQ_URL: amqp://cinema:cinema@rabbitmq:5672/
      JWT_SECRET: dev-secret-change-in-production
      FIREBASE_CREDENTIALS: /app/firebase-key.json
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend/firebase-key.json:/app/firebase-key.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
